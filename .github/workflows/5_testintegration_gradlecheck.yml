name: (5.x) Run tests

# This workflow runs when any of the following occur:
# - On any changes

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths:
      - "**/src/**" # Match changes in source files.
      - "*.gradle" # Match changes in Gradle configuration.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branches:
    if: ${{ !github.event.pull_request.draft }}
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      common_utils_ref: ${{ steps.resolve.outputs.wazuh_indexer_common_utils_branch }}
      alerting_ref: ${{ steps.resolve.outputs.wazuh_indexer_alerting_branch }}
      notifications_ref: ${{ steps.resolve.outputs.wazuh_indexer_notifications_branch }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve branches
        id: resolve
        uses: wazuh/wazuh-indexer/.github/actions/5_builderpackage_indexer_branch_resolver@v5.0.0-rc1
        with:
          branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Display resolved branches
        run: |
          echo "Common Utils branch: ${{ steps.resolve.outputs.wazuh_indexer_common_utils_branch }}"
          echo "Alerting branch: ${{ steps.resolve.outputs.wazuh_indexer_alerting_branch }}"
          echo "Notifications branch: ${{ steps.resolve.outputs.wazuh_indexer_notifications_branch }}"

  get-version:
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Get version
        id: version
        run: echo "version=$(jq -r .version<VERSION.json)" >> "$GITHUB_OUTPUT"

  publish-common-utils:
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    needs: [branches, get-version]
    steps:
      - name: Publish common-utils to Maven Local
        uses: wazuh/wazuh-indexer-common-utils/.github/actions/5_local_maven_publisher@v5.0.0-rc1
        with:
          version: ${{ needs.get-version.outputs.version }}
          revision: 0
          reference: ${{ needs.branches.outputs.common_utils_ref }}
      - name: Cache Maven Local
        uses: actions/cache/save@v5
        with:
          path: ~/.m2/repository
          key: ${{ github.run_id }}-common-utils

  publish-notifications:
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    needs: [branches, get-version, publish-common-utils]
    steps:
      - name: Restore Maven Local cache (common-utils)
        uses: actions/cache/restore@v5
        with:
          path: ~/.m2/repository
          key: ${{ github.run_id }}-common-utils
      - name: Publish notifications to Maven Local
        uses: wazuh/wazuh-indexer-notifications/.github/actions/5_local_maven_publisher@v5.0.0-rc1
        with:
          version: ${{ needs.get-version.outputs.version }}
          revision: 0
          reference: ${{ needs.branches.outputs.notifications_ref }}
      - name: Cache Maven Local
        uses: actions/cache/save@v5
        with:
          path: ~/.m2/repository
          key: ${{ github.run_id }}-notifications

  publish-alerting:
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    needs: [branches, get-version, publish-notifications]
    steps:
      - name: Restore Maven Local cache (notifications)
        uses: actions/cache/restore@v5
        with:
          path: ~/.m2/repository
          key: ${{ github.run_id }}-notifications
      - name: Publish alerting to Maven Local
        uses: wazuh/wazuh-indexer-alerting/.github/actions/5_local_maven_publisher@v5.0.0-rc1
        with:
          version: ${{ needs.get-version.outputs.version }}
          revision: 0
          reference: ${{ needs.branches.outputs.alerting_ref }}
      - name: Cache Maven Local
        uses: actions/cache/save@v5
        with:
          path: ~/.m2/repository
          key: ${{ github.run_id }}-alerting

  call-test-workflow:
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    needs: [get-version, publish-common-utils, publish-notifications, publish-alerting]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Restore Maven Local cache (alerting)
        uses: actions/cache/restore@v5
        with:
          path: ~/.m2/repository
          key: ${{ github.run_id }}-alerting

      - name: Publish to Maven local # SAP commons
        uses: ./.github/actions/5_local_maven_publisher
        with:
          version: ${{ needs.get-version.outputs.version }}
          revision: '0'
          reference: ${{ github.ref }}

      - name: Run Gradle check
        # The self-hosted runner executes as root, but OpenSearch test clusters
        # (launched by integTest during `check`) refuse to run as root. Run as a
        # dedicated non-root user instead.
        run: |
          id -u builder &>/dev/null || useradd -m builder
          # Hand the build user the workspace and the restored Maven local cache.
          cp -a "$HOME/.m2" /home/builder/.m2 2>/dev/null || true
          chown -R builder:builder "$GITHUB_WORKSPACE" /home/builder
          runuser -u builder -- env "JAVA_HOME=$JAVA_HOME" "PATH=$PATH" "GRADLE_USER_HOME=/home/builder/.gradle" \
            ./gradlew check "-Dversion=${{ needs.get-version.outputs.version }}" "-Drevision=0"
        shell: bash
